<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dailymango — 일상에 작은 쉼표를</title>
<meta name="description" content="Dailymango는 매일의 삶에 작은 쉼표를 더하는 모바일 앱 서비스 브랜드입니다.">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: linear-gradient(180deg, #fff8ec 0%, #ffeac6 100%);
    color: #2a2418;
    min-height: 100vh;
    line-height: 1.7;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 64px 24px; }
  header { text-align: center; margin-bottom: 64px; }
  h1 { font-size: 42px; font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; color: #d97706; }
  .tagline { font-size: 17px; color: #6b5a3e; }
  .apps { display: grid; gap: 20px; margin-top: 32px; }
  .app-card {
    background: #fff;
    border: 1px solid #f3e1bd;
    border-radius: 16px;
    padding: 24px 28px;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .app-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(217, 119, 6, 0.12); }
  .app-name { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: #2a2418; }
  .app-desc { font-size: 14px; color: #6b5a3e; }
  footer {
    margin-top: 80px;
    text-align: center;
    font-size: 13px;
    color: #9a8765;
    padding-top: 32px;
    border-top: 1px solid #f3e1bd;
  }
  footer a { color: #6b5a3e; text-decoration: none; margin: 0 8px; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🥭 Dailymango</h1>
    <p class="tagline">일상에 작은 쉼표를 더하는 모바일 앱 서비스</p>
  </header>

  <section>
    <h2 style="font-size:18px;color:#6b5a3e;margin-bottom:16px;">우리의 앱</h2>
    <div class="apps">
      <a href="/paperday/" class="app-card">
        <div class="app-name">마음의 쉼표 · Paperday</div>
        <div class="app-desc">매일 한 줄의 명언과 아름다운 배경으로 시작하는 하루</div>
      </a>
    </div>
  </section>

  <footer>
    <p>© 2026 Rollingmango. All rights reserved.</p>
    <p style="margin-top:8px;">
      <a href="mailto:support@rollingmango.co.kr">문의</a>
    </p>
  </footer>
</div>
</body>
</html>
